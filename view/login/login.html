<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title><?php echo $title; ?></title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;padding:30px 40px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);width:380px}
.card h1{font-size:20px;text-align:center;margin-bottom:24px;color:#333}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.form-group input{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;outline:none}
.form-group input:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,0.2)}
.btn{width:100%;padding:9px;background:#1890ff;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer}
.btn:hover{background:#40a9ff}
.result{margin-top:16px;padding:10px;border-radius:4px;font-size:13px;display:none}
.result.success{display:block;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.result.error{display:block;background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
pre{background:#f5f5f5;padding:12px;border-radius:4px;font-size:12px;margin-top:16px;border:1px solid #e8e8e8;overflow-x:auto}
.note{text-align:center;margin-top:16px;font-size:12px;color:#999}
.note a{color:#1890ff;text-decoration:none}
.note a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="card">
    <h1><?php echo $title; ?></h1>

    <form id="loginForm">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" value="admin" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" value="password" placeholder="请输入密码">
        </div>
        <button type="submit" class="btn">登 录</button>
    </form>

    <div id="result" class="result"></div>

    <pre id="apiResponse"></pre>

    <div class="note">
        <a href="<?= url('/login') ?>">← 返回用户列表</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    var form = new FormData(this);

    // ==============================================
    // TP5: 通常用 $.ajax 或 $.post
    // TP6: 前后端分离，推荐 fetch() 原生方式
    // ==============================================
    fetch('<?= url('/login/doLogin') ?>', {
        method: 'POST',
        body: form
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        var resultDiv = document.getElementById('result');
        var apiDiv = document.getElementById('apiResponse');

        apiDiv.textContent = JSON.stringify(data, null, 2);

        if (data.code === 0) {
            resultDiv.className = 'result success';
            resultDiv.textContent = '✅ ' + data.msg + ' (用户: ' + data.data.username + ')';
        } else {
            resultDiv.className = 'result error';
            resultDiv.textContent = '❌ ' + data.msg;
        }
    })
    .catch(function(err) {
        document.getElementById('result').className = 'result error';
        document.getElementById('result').textContent = '❌ 请求失败: ' + err.message;
    });
});
</script>

</body>
</html>
